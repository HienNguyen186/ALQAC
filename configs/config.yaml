# ALQAC 2026 — Pipeline Configuration
# Tối ưu cho BGE-M3 hybrid (dense + sparse) với BM25 first-stage

data:
  law_corpus:  "data/raw/corpus_law_pub.json"
  public_test: "data/raw/ALQAC2026_public_test.json"

retrieval:
  # ── BM25 first-stage ──────────────────────────────────────────────
  # Tăng từ 100 → 200 để BGE-M3 có đủ candidate để re-rank.
  # BM25 top-200 recall = 0.36 vs top-100 recall = 0.24.
  bm25_top_k_articles: 200

  # Số bộ luật dùng trong nhánh "law" của hybrid candidate pool.
  bm25_top_k_laws: 5

  # Chiến lược candidate pool: hybrid = article-branch ∪ law-branch.
  candidate_strategy: "hybrid"

  # ── BGE-M3 re-ranking ────────────────────────────────────────────
  dense_model:      "BAAI/bge-m3"
  dense_batch_size: 32          # Giảm nếu CPU RAM < 8 GB
  dense_top_k:      30          # BGE-M3 nhận 200 candidate, trả về 30

  # Trọng số hybrid: dense 0.6 + sparse 0.4 (theo paper BGE-M3)
  weight_dense:  0.6
  weight_sparse: 0.4

  # ColBERT: tắt mặc định (cần ~1.3 GB RAM thêm, chậm trên CPU)
  use_colbert: false

  # ── LLM reranker (sau BGE-M3) ────────────────────────────────────
  # Ground truth median = 10 điều, mean = 10.8
  # → tăng final_max_k lên 15 để không cắt cụt quá sớm
  final_min_k: 3
  final_max_k: 15

prediction:
  reranker_model:  "Qwen/Qwen2.5-3B-Instruct"
  predictor_model: "Qwen/Qwen3-8B"

output:
  submissions_dir: "outputs/submissions"
