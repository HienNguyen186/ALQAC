# ALQAC 2026 — Pipeline Configuration
# Kiến trúc: Multi-Retrieval (BM25 + BGE-M3 + VN Embedding + Chunked) + LLM Reranker

data:
  law_corpus:  "data/raw/corpus_law_pub.json"
  public_test: "data/raw/ALQAC2026_public_test.json"

retrieval:
  # ── BM25 first-stage ─────────────────────────────────────────────
  bm25_top_k_articles: 200
  bm25_top_k_laws:     5
  bm25_strategy:       "hybrid"

  # ── BGE-M3 (dense + sparse) ──────────────────────────────────────
  bgem3_model:   "BAAI/bge-m3"
  bgem3_top_k:   100
  weight_dense:  0.6
  weight_sparse: 0.4

  # ── Vietnamese Embedding (PhoBERT) ───────────────────────────────
  vn_model:  "dangvantuan/vietnamese-embedding"
  vn_top_k:  100

  # ── Chunked BM25 (sliding window) ────────────────────────────────
  chunked_top_k: 100

  # ── RRF Fusion output ────────────────────────────────────────────
  fusion_top_k: 500    # Tổng candidates sau union (input LLM reranker)

  # ── Misc ─────────────────────────────────────────────────────────
  batch_size: 32

  # ── LLM Reranker ─────────────────────────────────────────────────
  # GT median = 7 articles, mean = 8.3
  final_min_k: 3
  final_max_k: 15

prediction:
  reranker_model:  "Qwen/Qwen2.5-3B-Instruct"
  predictor_model: "Qwen/Qwen3-8B"

output:
  submissions_dir: "outputs/submissions"
